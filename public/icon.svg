<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#DC2626"/>
  
  <!-- Forklift Icon Simplified -->
  <g transform="translate(12, 16)">
    <!-- Base -->
    <rect x="2" y="24" width="24" height="4" fill="white" rx="1"/>
    
    <!-- Body -->
    <rect x="6" y="16" width="12" height="8" fill="white" rx="1"/>
    
    <!-- Mast -->
    <rect x="18" y="4" width="3" height="24" fill="white" rx="1"/>
    
    <!-- Fork -->
    <rect x="21" y="10" width="12" height="2" fill="white" rx="0.5"/>
    <rect x="21" y="14" width="12" height="2" fill="white" rx="0.5"/>
    
    <!-- Wheels -->
    <circle cx="8" cy="30" r="2.5" fill="white"/>
    <circle cx="20" cy="30" r="2.5" fill="white"/>
    
    <!-- Details -->
    <rect x="9" y="18" width="6" height="4" fill="#DC2626" rx="0.5"/>
  </g>
</svg>
